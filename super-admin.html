<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - vikashClasses</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .teacher-card { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .teacher-info { flex: 1; }
        .teacher-code { font-family: monospace; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { color: #ef4444; background: #fee; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
        .success { color: #22c55e; background: #e6f7e6; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 Super Admin Dashboard</h1>
            <div id="userInfo"></div>
        </div>
        
        <div id="authSection" class="card">
            <h2>🔐 Admin Access</h2>
            <button id="googleLoginBtn" class="btn-primary">Sign in with Google</button>
        </div>
        
        <div id="adminPanel" style="display: none;">
            <div class="card">
                <h2>➕ Add New Teacher</h2>
                <input type="email" id="teacherEmail" placeholder="teacher@example.com">
                <input type="text" id="teacherName" placeholder="Full Name (optional)">
                <button id="addTeacherBtn" class="btn-primary">Generate Code & Add</button>
            </div>
            
            <div class="card">
                <h2>👩‍🏫 Teachers</h2>
                <div id="teachersList">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyACO39eJRrdbgowWcqgdp0DFkDPUhbQQfQ",
            authDomain: "database-367af.firebaseapp.com",
            projectId: "database-367af",
            storageBucket: "database-367af.firebasestorage.app",
            messagingSenderId: "246204653332",
            appId: "1:246204653332:web:8daf25ea24112de940ec01"
        };
        
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // CRITICAL: Set database to vikashclasses-db BEFORE anything else
        const db = firebase.firestore();
        db.settings({ databaseId: 'vikashclasses-db' });
        console.log('✅ Connected to vikashclasses-db');
        
        const auth = firebase.auth();
        const SUPER_ADMIN_EMAIL = 'vikashisexploringai@gmail.com';
        
        let currentUser = null;
        
        // Auth state listener
        auth.onAuthStateChanged(async (user) => {
            if (user && user.email === SUPER_ADMIN_EMAIL) {
                // Check if super admin claim exists
                const token = await user.getIdTokenResult();
                if (!token.claims.superAdmin) {
                    console.log('Setting superAdmin claim...');
                    // You'll need to set this claim via Firebase CLI or Cloud Function
                    // For now, we'll still allow access but show warning
                }
                currentUser = user;
                document.getElementById('userInfo').innerHTML = `
                    <span>👑 ${user.displayName || user.email}</span>
                    <button onclick="logout()" style="margin-left: 12px;">Logout</button>
                `;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadTeachers();
            } else if (user) {
                document.getElementById('authSection').innerHTML = `
                    <div class="error">⚠️ Unauthorized. You are not a Super Admin.</div>
                    <button onclick="logout()">Logout</button>
                `;
            } else {
                document.getElementById('userInfo').innerHTML = '';
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
            }
        });
        
        // Google Login
        document.getElementById('googleLoginBtn')?.addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed: ' + error.message);
            }
        });
        
        // Generate random teacher code
        function generateTeacherCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = 'TEACH-';
            for (let i = 0; i < 6; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            return code;
        }
        
        // Load teachers
        async function loadTeachers() {
            const listDiv = document.getElementById('teachersList');
            listDiv.innerHTML = '<div class="loading">Loading teachers...</div>';
            
            try {
                const snapshot = await db.collection('teachers').get();
                if (snapshot.empty) {
                    listDiv.innerHTML = '<p>No teachers added yet.</p>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(doc => {
                    const teacher = doc.data();
                    html += `
                        <div class="teacher-card">
                            <div class="teacher-info">
                                <strong>${teacher.displayName || teacher.email}</strong><br>
                                <small>${teacher.email}</small><br>
                                <span class="teacher-code">Code: ${teacher.teacherCode}</span>
                                <small> · Added: ${teacher.createdAt?.toDate ? new Date(teacher.createdAt.toDate()).toLocaleDateString() : 'N/A'}</small>
                            </div>
                            <div>
                                <button class="btn-warning" onclick="generateNewCode('${doc.id}')">New Code</button>
                                <button class="btn-danger" onclick="removeTeacher('${doc.id}')">Remove</button>
                            </div>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
            } catch (error) {
                console.error('Error loading teachers:', error);
                listDiv.innerHTML = `<div class="error">Error loading teachers: ${error.message}</div>`;
            }
        }
        
        // Add teacher
        window.addTeacher = async function() {
            const email = document.getElementById('teacherEmail').value;
            const name = document.getElementById('teacherName').value;
            
            if (!email) {
                alert('Please enter teacher email');
                return;
            }
            
            const teacherCode = generateTeacherCode();
            const addBtn = document.getElementById('addTeacherBtn');
            addBtn.textContent = 'Adding...';
            addBtn.disabled = true;
            
            try {
                // Check if teacher exists
                const existing = await db.collection('teachers').where('email', '==', email).get();
                if (!existing.empty) {
                    alert('Teacher already exists');
                    addBtn.textContent = 'Generate Code & Add';
                    addBtn.disabled = false;
                    return;
                }
                
                // Add teacher
                await db.collection('teachers').add({
                    email: email,
                    displayName: name || email.split('@')[0],
                    teacherCode: teacherCode,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isActive: true,
                    classes: []
                });
                
                // Also store in superAdmin settings
                const settingsRef = db.collection('superAdmin').doc('settings');
                const settingsDoc = await settingsRef.get();
                const teacherCodes = settingsDoc.exists ? settingsDoc.data().teacherCodes || {} : {};
                teacherCodes[teacherCode] = {
                    email: email,
                    displayName: name || email.split('@')[0],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    used: false
                };
                await settingsRef.set({ teacherCodes: teacherCodes }, { merge: true });
                
                alert(`Teacher added! Code: ${teacherCode}`);
                
                document.getElementById('teacherEmail').value = '';
                document.getElementById('teacherName').value = '';
                loadTeachers();
                
            } catch (error) {
                console.error('Error adding teacher:', error);
                alert('Failed to add teacher: ' + error.message);
            } finally {
                addBtn.textContent = 'Generate Code & Add';
                addBtn.disabled = false;
            }
        };
        
        // Generate new code
        window.generateNewCode = async function(teacherId) {
            const newCode = generateTeacherCode();
            try {
                await db.collection('teachers').doc(teacherId).update({ teacherCode: newCode });
                alert(`New code generated: ${newCode}`);
                loadTeachers();
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        };
        
        // Remove teacher
        window.removeTeacher = async function(teacherId) {
            if (!confirm('Remove this teacher? This will delete all their data.')) return;
            try {
                await db.collection('teachers').doc(teacherId).delete();
                loadTeachers();
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        };
        
        // Logout
        window.logout = async function() {
            await auth.signOut();
            location.reload();
        };
        
        // Attach event listeners after DOM loads
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('addTeacherBtn')?.addEventListener('click', window.addTeacher);
        });
    </script>
</body>
</html>
