<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - vikashClasses</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .teacher-card { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .teacher-info { flex: 1; }
        .teacher-code { font-family: monospace; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { color: #ef4444; background: #fee; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 Super Admin Dashboard</h1>
            <div id="userInfo"></div>
        </div>
        
        <div id="authSection" class="card">
            <h2>🔐 Admin Access</h2>
            <button id="googleLoginBtn" class="btn-primary">Sign in with Google</button>
        </div>
        
        <div id="adminPanel" style="display: none;">
            <div class="card">
                <h2>➕ Add New Teacher</h2>
                <input type="email" id="teacherEmail" placeholder="teacher@example.com">
                <input type="text" id="teacherName" placeholder="Full Name (optional)">
                <button id="addTeacherBtn" class="btn-primary">Generate Code & Add</button>
            </div>
            
            <div class="card">
                <h2>👩‍🏫 Teachers</h2>
                <div id="teachersList">Loading...</div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, getDocs, addDoc, query, where, doc, updateDoc, deleteDoc, setDoc, getDoc, serverTimestamp } from 'firebase/firestore';
        
        const firebaseConfig = {
            apiKey: "AIzaSyACO39eJRrdbgowWcqgdp0DFkDPUhbQQfQ",
            authDomain: "database-367af.firebaseapp.com",
            projectId: "database-367af",
            storageBucket: "database-367af.firebasestorage.app",
            messagingSenderId: "246204653332",
            appId: "1:246204653332:web:8daf25ea24112de940ec01"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Connect to vikashclasses-db (this works!)
        const db = getFirestore(app, 'vikashclasses');
        console.log('✅ Connected to vikashclasses');
        
        const SUPER_ADMIN_EMAIL = 'vikashisexploringai@gmail.com';
        
        // UI Elements
        const authSection = document.getElementById('authSection');
        const adminPanel = document.getElementById('adminPanel');
        const userInfoDiv = document.getElementById('userInfo');
        
        // Auth state listener
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === SUPER_ADMIN_EMAIL) {
                userInfoDiv.innerHTML = `
                    <span>👑 ${user.displayName || user.email}</span>
                    <button onclick="window.logout()" style="margin-left: 12px;">Logout</button>
                `;
                authSection.style.display = 'none';
                adminPanel.style.display = 'block';
                loadTeachers();
            } else if (user) {
                authSection.innerHTML = `
                    <div class="error">⚠️ Unauthorized. You are not a Super Admin.</div>
                    <button onclick="window.logout()">Logout</button>
                `;
            } else {
                userInfoDiv.innerHTML = '';
                authSection.style.display = 'block';
                adminPanel.style.display = 'none';
            }
        });
        
        // Google Login
        document.getElementById('googleLoginBtn')?.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed: ' + error.message);
            }
        });
        
        // Generate random teacher code
        function generateTeacherCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = 'TEACH-';
            for (let i = 0; i < 6; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            return code;
        }
        
        // Load teachers
        async function loadTeachers() {
            const listDiv = document.getElementById('teachersList');
            listDiv.innerHTML = '<div class="loading">Loading teachers...</div>';
            
            try {
                const teachersRef = collection(db, 'teachers');
                const snapshot = await getDocs(teachersRef);
                
                if (snapshot.empty) {
                    listDiv.innerHTML = '<p>No teachers added yet.</p>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(docSnap => {
                    const teacher = docSnap.data();
                    html += `
                        <div class="teacher-card">
                            <div class="teacher-info">
                                <strong>${escapeHtml(teacher.displayName || teacher.email)}</strong><br>
                                <small>${escapeHtml(teacher.email)}</small><br>
                                <span class="teacher-code">Code: ${teacher.teacherCode}</span>
                                <small> · Added: ${teacher.createdAt?.toDate ? new Date(teacher.createdAt.toDate()).toLocaleDateString() : 'N/A'}</small>
                            </div>
                            <div>
                                <button class="btn-warning" onclick="window.generateNewCode('${docSnap.id}')">New Code</button>
                                <button class="btn-danger" onclick="window.removeTeacher('${docSnap.id}')">Remove</button>
                            </div>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
            } catch (error) {
                console.error('Error loading teachers:', error);
                listDiv.innerHTML = `<div class="error">Error loading teachers: ${error.message}</div>`;
            }
        }
        
        // Add teacher
       // Add teacher
window.addTeacher = async function() {
    const email = document.getElementById('teacherEmail').value;
    const name = document.getElementById('teacherName').value;
    
    if (!email) {
        alert('Please enter teacher email');
        return;
    }
    
    const teacherCode = generateTeacherCode();
    const addBtn = document.getElementById('addTeacherBtn');
    addBtn.textContent = 'Adding...';
    addBtn.disabled = true;
    
    try {
        // Check if teacher exists
        const teachersRef = collection(db, 'teachers');
        const q = query(teachersRef, where('email', '==', email));
        const existing = await getDocs(q);
        
        if (!existing.empty) {
            alert('Teacher already exists');
            addBtn.textContent = 'Generate Code & Add';
            addBtn.disabled = false;
            return;
        }
        
        // Add teacher
        await addDoc(collection(db, 'teachers'), {
            email: email,
            displayName: name || email.split('@')[0],
            teacherCode: teacherCode,
            createdAt: serverTimestamp(),
            isActive: true,
            classes: []
        });
        
        // Also store in superAdmin settings (create if doesn't exist)
        const settingsRef = doc(db, 'superAdmin', 'settings');
        const settingsDoc = await getDoc(settingsRef);
        
        let teacherCodes = {};
        if (settingsDoc.exists) {
            teacherCodes = settingsDoc.data().teacherCodes || {};
        }
        
        teacherCodes[teacherCode] = {
            email: email,
            displayName: name || email.split('@')[0],
            createdAt: serverTimestamp(),
            used: false
        };
        
        await setDoc(settingsRef, { teacherCodes: teacherCodes }, { merge: true });
        
        alert(`Teacher added! Code: ${teacherCode}`);
        
        document.getElementById('teacherEmail').value = '';
        document.getElementById('teacherName').value = '';
        loadTeachers();
        
    } catch (error) {
        console.error('Error adding teacher:', error);
        alert('Failed to add teacher: ' + error.message);
    } finally {
        addBtn.textContent = 'Generate Code & Add';
        addBtn.disabled = false;
    }
};
        
        // Generate new code
        window.generateNewCode = async function(teacherId) {
            const newCode = generateTeacherCode();
            try {
                const teacherRef = doc(db, 'teachers', teacherId);
                await updateDoc(teacherRef, { teacherCode: newCode });
                alert(`New code generated: ${newCode}`);
                loadTeachers();
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        };
        
        // Remove teacher
        window.removeTeacher = async function(teacherId) {
            if (!confirm('Remove this teacher? This will delete all their data.')) return;
            try {
                const teacherRef = doc(db, 'teachers', teacherId);
                await deleteDoc(teacherRef);
                loadTeachers();
            } catch (error) {
                alert('Failed: ' + error.message);
            }
        };
        
        // Logout
        window.logout = async function() {
            await auth.signOut();
            location.reload();
        };
        
        function escapeHtml(text) {
            if (!text) return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Attach event listeners
        document.getElementById('addTeacherBtn')?.addEventListener('click', window.addTeacher);
        
        console.log('✅ Super Admin ready, connected to vikashclasses');
    </script>
</body>
</html>
