<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - vikashClasses</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Card */
        .card { background: white; border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logout-btn { 
            background: #ef4444; 
            color: white; 
            padding: 8px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 500; 
        }
        .logout-btn:hover { background: #dc2626; }
        
        /* Ribbon */
        .ribbon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .ribbon h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }
        .teacher-code {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
        }
        .btn-primary:hover { background: #2563eb; }
        
        /* Class Card */
        .class-card {
            border: 1px solid #e2e8f0;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .class-card:hover {
            background: #f8fafc;
            transform: translateX(4px);
        }
        .class-name {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .class-description {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .class-stats {
            font-size: 13px;
            color: #3b82f6;
            margin-bottom: 8px;
        }
        .class-code {
            font-size: 12px;
            color: #64748b;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            margin: 20px;
        }
        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .modal-cancel {
            background: white;
            border: 1px solid #e2e8f0;
        }
        .modal-confirm {
            background: #3b82f6;
            color: white;
            border: none;
        }
        .close-modal-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        .remove-student-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .student-item {
            border: 1px solid #e2e8f0;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Utility */
        .error { color: #ef4444; background: #fee; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .forgot-link { text-align: center; margin-top: 16px; }
        .forgot-link a { color: #3b82f6; text-decoration: none; cursor: pointer; }
        .forgot-link a:hover { text-decoration: underline; }
        h2 { margin-top: 0; margin-bottom: 24px; text-align: center; }
        h3 { margin: 0 0 16px 0; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">📚 Vikash Classes</div>
            <button id="logoutBtn" class="logout-btn" style="display: none;">🚪 Logout</button>
        </div>
        
        <!-- Login Section -->
        <div id="loginSection" class="card">
            <h2>👩‍🏫 Teacher Login</h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="teacher@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button id="loginBtn" class="btn-primary">Login</button>
            <div class="forgot-link">
                <a id="forgotPasswordLink">Forgot Password?</a>
            </div>
            <div style="text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0;">
                <a href="setup.html" style="color: #3b82f6; text-decoration: none; font-size: 14px;">
                    🆕 New Teacher? Set up your account here
                </a>
            </div>
        </div>
        
        <!-- Dashboard (hidden by default) -->
        <div id="dashboard" style="display: none;">
            <div class="ribbon">
                <h2 id="teacherNameHeader">Welcome, Teacher!</h2>
                <div class="teacher-code" id="teacherCodeDisplay"></div>
            </div>
            
            <div class="card">
                <h3>📚 My Classes</h3>
                <div id="classesList">Loading...</div>
                <button id="createClassBtn" class="btn-primary" style="margin-top: 16px;">+ Create New Class</button>
            </div>
        </div>
        
        <!-- Create Class Modal -->
        <div id="createClassModal" class="modal-overlay">
            <div class="modal-content">
                <h3>Create New Class</h3>
                <div class="form-group">
                    <label>Class Name</label>
                    <input type="text" id="newClassName" placeholder="e.g., Class 1">
                </div>
                <div class="form-group">
                    <label>Description (optional)</label>
                    <input type="text" id="newClassDescription" placeholder="Brief description">
                </div>
                <div class="modal-buttons">
                    <button id="cancelCreateBtn" class="modal-cancel">Cancel</button>
                    <button id="confirmCreateBtn" class="modal-confirm">Create</button>
                </div>
            </div>
        </div>
        
        <!-- Class Detail Modal -->
        <div id="classDetailModal" class="modal-overlay">
            <div class="modal-content" style="max-width: 600px;">
                <h3 id="modalClassName">Class Name</h3>
                <div style="margin-bottom: 20px;">
                    <strong>Enrollment Code:</strong>
                    <span id="modalClassCode" style="font-family: monospace; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; margin-left: 8px;"></span>
                    <button id="generateNewCodeBtn" style="margin-left: 12px; padding: 4px 12px; background: #f59e0b; color: white; border: none; border-radius: 6px; cursor: pointer;">Generate New Code</button>
                </div>
                <h4>Enrolled Students</h4>
                <div id="modalStudentsList">Loading...</div>
                <button id="closeModalBtn" class="close-modal-btn">Close</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script type="module" src="dashboard.js"></script>
</body>
</html>
