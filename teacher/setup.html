<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Your Teacher Account - vikashClasses</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f5f5f5; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 450px; width: 100%; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        h2 { text-align: center; margin-bottom: 24px; font-size: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .btn-primary { background: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; width: 100%; font-size: 16px; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .error { color: #ef4444; background: #fee; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
        .success { color: #22c55e; background: #e6f7e6; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; }
        .info { color: #3b82f6; background: #eff6ff; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-size: 14px; }
        .hint { font-size: 12px; color: #64748b; margin-top: 4px; }
        .manual-link { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
        .manual-link a { color: #3b82f6; text-decoration: none; cursor: pointer; }
        .manual-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">📚 Vikash Classes</div>
            <h2>Set Up Your Teacher Account</h2>
            
            <div id="status"></div>
            
            <div id="setupForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="teacher@example.com">
                    <div class="hint">Enter the email your administrator used to add you</div>
                </div>
                <div class="form-group">
                    <label>Teacher Code</label>
                    <input type="text" id="teacherCode" placeholder="TEACH-XXXXXX">
                    <div class="hint">Your teacher code was provided by your administrator</div>
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password">
                </div>
                <button id="setupBtn" class="btn-primary">Create Account & Set Password</button>
            </div>
            
            <div class="manual-link">
                <a href="index.html">← Already have an account? Login here</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase config - REPLACE WITH YOUR ACTUAL CONFIG
        const firebaseConfig = {
  apiKey: "AIzaSyBhujqx9CZwK_NUrQgcUEX5wxKS0hYjXKc",
  authDomain: "vikash-classes-c98f8.firebaseapp.com",
  projectId: "vikash-classes-c98f8",
  storageBucket: "vikash-classes-c98f8.firebasestorage.app",
  messagingSenderId: "456891384843",
  appId: "1:456891384843:web:cf845b07c2884a4c64b30e"
};
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const statusDiv = document.getElementById('status');
        const setupBtn = document.getElementById('setupBtn');
        
        // Get email and code from URL parameters if present
        const urlParams = new URLSearchParams(window.location.search);
        const urlEmail = urlParams.get('email');
        const urlCode = urlParams.get('code');
        
        if (urlEmail) {
            document.getElementById('email').value = urlEmail;
        }
        if (urlCode) {
            document.getElementById('teacherCode').value = urlCode;
        }
        
        setupBtn.addEventListener('click', async () => {
            const teacherEmail = document.getElementById('email').value.trim();
            let teacherCode = document.getElementById('teacherCode').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!teacherEmail || !teacherCode) {
                showStatus('Please enter both email and teacher code', 'error');
                return;
            }
            
            teacherCode = teacherCode.toUpperCase();
            
            if (!password) {
                showStatus('Please enter a password', 'error');
                return;
            }
            
            if (password.length < 6) {
                showStatus('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showStatus('Passwords do not match', 'error');
                return;
            }
            
            setupBtn.disabled = true;
            setupBtn.textContent = 'Setting up...';
            
            try {
                // Step 1: Verify teacher code exists in Firestore
                const teachersRef = db.collection('teachers');
                const q = teachersRef.where('teacherCode', '==', teacherCode);
                const snapshot = await q.get();
                
                if (snapshot.empty) {
                    showStatus('Invalid teacher code. Please check with your administrator.', 'error');
                    setupBtn.disabled = false;
                    setupBtn.textContent = 'Create Account & Set Password';
                    return;
                }
                
                const teacherDoc = snapshot.docs[0];
                const teacherData = teacherDoc.data();
                
                if (teacherData.email !== teacherEmail) {
                    showStatus('Email does not match teacher record.', 'error');
                    setupBtn.disabled = false;
                    setupBtn.textContent = 'Create Account & Set Password';
                    return;
                }
                
                if (teacherData.hasSetupPassword) {
                    showStatus('Account already set up. Please login instead.', 'error');
                    setupBtn.disabled = false;
                    setupBtn.textContent = 'Create Account & Set Password';
                    return;
                }
                
                // Step 2: Try to sign in first (in case account exists)
                let user = null;
                let isNewAccount = false;
                
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(teacherEmail, password);
                    user = userCredential.user;
                    console.log('Signed in existing account');
                } catch (signInError) {
                    if (signInError.code === 'auth/user-not-found') {
                        // Account doesn't exist, create new
                        console.log('Creating new account');
                        const userCredential = await auth.createUserWithEmailAndPassword(teacherEmail, password);
                        user = userCredential.user;
                        isNewAccount = true;
                    } else if (signInError.code === 'auth/wrong-password') {
                        showStatus('This email already has an account but the password is incorrect. Please use "Forgot Password" on the login page.', 'error');
                        setupBtn.disabled = false;
                        setupBtn.textContent = 'Create Account & Set Password';
                        return;
                    } else {
                        throw signInError;
                    }
                }
                
                // Step 3: Update teacher record
                await teacherDoc.ref.update({
                    authUid: user.uid,
                    hasSetupPassword: true,
                    setupCompletedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                if (isNewAccount) {
                    showStatus('Account created successfully! Redirecting to dashboard...', 'success');
                } else {
                    showStatus('Account linked successfully! Redirecting to dashboard...', 'success');
                }
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Setup error:', error);
                
                if (error.code === 'auth/email-already-in-use') {
                    showStatus('This email already has an account. Please login instead.', 'error');
                } else if (error.code === 'auth/invalid-email') {
                    showStatus('Please enter a valid email address.', 'error');
                } else if (error.code === 'auth/weak-password') {
                    showStatus('Password is too weak. Use at least 6 characters.', 'error');
                } else {
                    showStatus('Setup failed: ' + error.message, 'error');
                }
                
                setupBtn.disabled = false;
                setupBtn.textContent = 'Create Account & Set Password';
            }
        });
        
        function showStatus(message, type) {
            statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                if (statusDiv.innerHTML === `<div class="${type}">${message}</div>`) {
                    statusDiv.innerHTML = '';
                }
            }, 8000);
        }
        
        // Check if already logged in
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snapshot = await db.collection('teachers').where('authUid', '==', user.uid).get();
                if (!snapshot.empty) {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
